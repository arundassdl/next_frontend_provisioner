# Static inventory for Press proxy servers.
# proxy_manager.py renders this dynamically at runtime from Press Server DocTypes.
# This file serves as the fallback / reference template.

[proxies]
proxy1 ansible_host=10.0.0.5 ansible_user=frappe ansible_ssh_private_key_file=/home/frappe/.ssh/press_deploy

[proxies:vars]
ansible_python_interpreter=/usr/bin/python3
nginx_conf_dir=/etc/nginx/conf.d
nginx_service=nginx
